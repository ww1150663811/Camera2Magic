name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: cd Camera2Magic-1.1.2-fix && chmod +x gradlew
      
      - name: Build Debug APK
        run: cd Camera2Magic-1.1.2-fix && ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: Camera2Magic-1.1.2-fix/app/build/outputs/apk/debug/app-debug.apk
