name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Grant execute permission for gradlew
        run: cd Camera2Magic-1.1.2-fix && chmod +x gradlew
      
      - name: Build Debug APK
        run: cd Camera2Magic-1.1.2-fix && ./gradlew assembleDebug --info
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: Camera2Magic-1.1.2-fix/app/build/outputs/apk/debug/*.apk
      
      - name: Upload Build Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-reports
          path: Camera2Magic-1.1.2-fix/app/build/reports/
